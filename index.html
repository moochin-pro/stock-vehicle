<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambolink21 | Cloud Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .page-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 10px; }
        .card-active { border: 2px solid #10b981 !important; background: #f0fdf4 !important; }
        @media print { .no-print { display: none !important; } main { margin-left: 0 !important; padding: 0 !important; } }
    </style>
</head>
<body class="text-slate-900">

    <div id="loginOverlay" class="fixed inset-0 bg-[#0f172a] flex items-center justify-center z-[100]">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-[400px] text-center border-t-8 border-emerald-400">
            <h1 class="text-xl font-black mb-8 uppercase tracking-tighter">Cambolink21</h1>
            <input id="username" type="text" placeholder="Username" class="w-full border p-4 rounded-xl mb-4 outline-none text-center font-bold">
            <input id="password" type="password" placeholder="Password" class="w-full border p-4 rounded-xl mb-6 outline-none text-center font-bold">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black hover:bg-emerald-500 transition-all uppercase">Login</button>
        </div>
    </div>

    <div id="app" class="hidden flex">
        <aside class="w-72 h-screen bg-[#0f172a] text-white fixed p-8 flex flex-col no-print shadow-2xl">
            <div class="mb-12 flex items-center gap-3"><div class="w-8 h-8 bg-emerald-400 rounded-lg"></div><span class="text-sm font-black uppercase tracking-tighter">Cambolink21</span></div>
            <nav class="space-y-2 flex-1">
                <button onclick="showPage('page-fix')" class="w-full text-left p-4 rounded-2xl font-bold transition-all" id="nav-fix">🔧 Service Entry</button>
                <button onclick="showPage('page-parts')" class="w-full text-left p-4 rounded-2xl font-bold transition-all" id="nav-parts">📦 Inventory</button>
                <button onclick="showPage('page-vehicles')" class="w-full text-left p-4 rounded-2xl font-bold transition-all" id="nav-vehicles">🚚 Asset List</button>
                <button onclick="showPage('page-report')" class="w-full text-left p-4 rounded-2xl font-bold transition-all" id="nav-report">📜 Operations Report</button>
            </nav>
            <button onclick="logout()" class="w-full p-4 text-red-400 font-bold text-left hover:bg-red-500/10 rounded-2xl transition">Logout</button>
        </aside>

        <main class="flex-1 ml-72 p-12">
            <div id="page-fix" class="page-content">
                <h1 class="text-3xl font-black uppercase mb-10 tracking-tighter">Workshop Log</h1>
                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-8 space-y-6">
                        <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                            <div class="flex justify-between items-center mb-4"><h3 class="font-black text-xs uppercase text-emerald-500">1. Select Vehicle</h3><input id="fixVSearch" onkeyup="filterFix()" placeholder="Plate..." class="bg-slate-50 p-2 rounded-lg text-sm w-48 outline-none font-bold"></div>
                            <div id="fixVList" class="space-y-2 max-h-60 overflow-y-auto custom-scroll pr-2"></div>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border shadow-sm">
                            <div class="flex justify-between items-center mb-4"><h3 class="font-black text-xs uppercase text-sky-500">2. Select Part</h3><input id="fixPSearch" onkeyup="filterFix()" placeholder="Search Part..." class="bg-slate-50 p-2 rounded-lg text-sm w-48 outline-none font-bold"></div>
                            <div id="fixPList" class="space-y-2 max-h-60 overflow-y-auto custom-scroll pr-2"></div>
                        </div>
                    </div>
                    <div class="col-span-4">
                        <div class="bg-white border-2 border-emerald-50 p-8 rounded-[3rem] shadow-2xl sticky top-12">
                            <div class="space-y-4 mb-8">
                                <div class="bg-emerald-50 p-4 rounded-2xl"><p class="text-[10px] font-bold text-emerald-600 uppercase">Unit</p><p id="sumV" class="font-black text-lg">---</p></div>
                                <div class="bg-sky-50 p-4 rounded-2xl"><p class="text-[10px] font-bold text-sky-600 uppercase">Part</p><p id="sumP" class="font-black text-lg">---</p></div>
                                <div class="flex items-center justify-between p-2"><span class="font-black text-sm uppercase">Qty</span><div class="flex items-center gap-4 bg-slate-900 text-white rounded-xl p-1"><button onclick="adjustQty(-1)" class="w-10 h-10 font-bold">-</button><input id="fixQty" type="number" value="1" readonly class="bg-transparent w-8 text-center font-black"><button onclick="adjustQty(1)" class="w-10 h-10 font-bold">+</button></div></div>
                            </div>
                            <button onclick="applyFix()" class="w-full bg-emerald-500 text-white py-6 rounded-[1.5rem] font-black uppercase hover:bg-emerald-600 shadow-lg">Submit Entry</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-parts" class="page-content">
                <div class="flex justify-between items-end mb-8 no-print">
                    <div class="flex gap-4 items-end">
                        <h1 class="text-3xl font-black uppercase tracking-tighter">Inventory</h1>
                        <select id="inventoryMonthFilter" onchange="updateUI()" class="bg-white border p-3 rounded-2xl font-bold text-[10px] outline-none shadow-sm">
                            <option value="all">View All Stock</option>
                            <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option><option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option><option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option><option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-3 rounded-xl font-black uppercase text-[10px]">Print</button>
                        <button onclick="exportInventoryExcel()" class="bg-emerald-600 text-white px-4 py-3 rounded-xl font-black uppercase text-[10px]">Excel</button>
                    </div>
                </div>
                <div class="bg-emerald-600 p-6 rounded-[2.5rem] mb-8 flex gap-4 no-print shadow-xl">
                    <input id="pName" placeholder="Item Name" class="bg-white p-4 rounded-2xl flex-[2] outline-none font-bold">
                    <input id="pPrice" type="number" placeholder="Price $" class="bg-white p-4 rounded-2xl flex-1 outline-none text-center font-bold">
                    <input id="pQty" type="number" placeholder="Qty" class="bg-white p-4 rounded-2xl flex-1 outline-none text-center font-bold">
                    <button id="savePartBtn" onclick="addPart()" class="bg-slate-900 text-white px-10 rounded-2xl font-black uppercase text-xs">Save Item</button>
                </div>
                <div class="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                    <table class="w-full text-left" id="inventoryTable">
                        <thead class="bg-emerald-50 text-[10px] font-black uppercase text-emerald-700 border-b">
                            <tr><th class="p-6">Item Name</th><th class="p-6">Last Update</th><th class="p-6">Unit Price</th><th class="p-6 text-center">Live Stock</th><th class="p-6">Total Value</th><th class="p-6 text-right no-print">Actions</th></tr>
                        </thead>
                        <tbody id="partsList"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-vehicles" class="page-content">
                <h1 class="text-3xl font-black uppercase mb-8 tracking-tighter">Fleet</h1>
                <div class="bg-sky-500 p-6 rounded-[2.5rem] mb-8 flex gap-4 no-print shadow-xl">
                    <input id="vPlate" placeholder="Plate Number" class="bg-white p-4 rounded-2xl flex-1 outline-none font-bold uppercase">
                    <input id="vModel" placeholder="Vehicle Model" class="bg-white p-4 rounded-2xl flex-1 outline-none font-bold">
                    <button onclick="addVehicle()" class="bg-slate-900 text-white px-10 rounded-2xl font-black uppercase text-xs">Add Asset</button>
                </div>
                <div class="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-sky-50 text-[10px] font-black uppercase text-sky-700 border-b"><tr><th class="p-6">Plate</th><th class="p-6">Model</th><th class="p-6 text-right no-print">Actions</th></tr></thead>
                        <tbody id="vTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-report" class="page-content">
                <div class="flex justify-between items-end mb-8 no-print">
                    <div class="flex gap-4 items-end">
                        <div class="bg-white p-3 rounded-2xl border shadow-sm w-48"><p class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Search</p><input id="reportSearch" onkeyup="updateUI()" class="w-full font-bold outline-none text-sm text-sky-600 bg-transparent"></div>
                        <select id="reportMonthFilter" onchange="updateUI()" class="bg-white border p-4 rounded-2xl font-bold text-xs outline-none">
                            <option value="all">All Months</option>
                            <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option><option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option><option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option><option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-3 rounded-xl font-black uppercase text-[10px]">Print</button>
                        <button onclick="exportReportExcel()" class="bg-emerald-600 text-white px-4 py-3 rounded-xl font-black uppercase text-[10px]">Excel</button>
                    </div>
                </div>
                <div class="bg-white p-12 rounded-[3rem] border shadow-sm print-area">
                    <table class="w-full text-left" id="reportDataTable">
                        <thead class="text-[10px] font-black uppercase text-slate-400 border-b">
                            <tr><th class="py-4">Date</th><th>Plate</th><th class="text-emerald-600">Model</th><th>Part</th><th class="text-center">Qty</th><th>Subtotal</th><th class="no-print action-col">Action</th></tr>
                        </thead>
                        <tbody id="reportTable"></tbody>
                        <tfoot><tr><td colspan="5" class="py-10 text-right pr-8 font-black text-slate-400 uppercase text-xs">Monthly Total:</td><td id="totalSpend" class="py-10 text-3xl font-black text-emerald-600"></td><td></td></tr></tfoot>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCSgm3aU8VvCrCv1bTAhqm9OS5Efhkpvzo",
            authDomain: "cambolink21-inventory.firebaseapp.com",
            projectId: "cambolink21-inventory",
            storageBucket: "cambolink21-inventory.firebasestorage.app",
            messagingSenderId: "1018500583599",
            appId: "1:1018500583599:web:36a866c89309d0b0c7c45a",
            measurementId: "G-Y5S5NZGXSZ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
    <script src="app.js"></script>
</body>
</html>
