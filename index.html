<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cambolink21 | Express Stock</title>
    
    <!-- SDKs -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--tg-theme-bg-color, #f8fafc); 
            color: var(--tg-theme-text-color, #0f172a);
            margin: 0; padding: 0;
        }
        .page-content { display: none; padding-bottom: 90px; }
        .page-content.active { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Navigation Styles */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: #0f172a; display: none; justify-content: space-around;
            align-items: center; z-index: 50; padding-bottom: env(safe-area-inset-bottom);
        }
        @media (max-width: 768px) {
            aside { display: none !important; }
            main { margin-left: 0 !important; padding: 1rem !important; }
            .bottom-nav { display: flex; }
        }
        .card-active { border: 2px solid #10b981 !important; background: #f0fdf4 !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-[#0f172a] flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-[90%] max-w-[380px] text-center border-t-8 border-emerald-400">
            <h1 class="text-xl font-black mb-6 uppercase tracking-tighter">Cambolink21</h1>
            <input id="username" type="text" placeholder="User" class="w-full border p-4 rounded-xl mb-3 text-center font-bold outline-none focus:ring-2 ring-emerald-400">
            <input id="password" type="password" placeholder="Pass" class="w-full border p-4 rounded-xl mb-6 text-center font-bold outline-none focus:ring-2 ring-emerald-400">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-black uppercase">Enter System</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <!-- Sidebar (Desktop) -->
        <aside class="w-64 h-screen bg-[#0f172a] text-white fixed p-6 flex flex-col shadow-2xl">
            <div class="mb-10 font-black uppercase text-xs tracking-widest text-emerald-400">Admin Panel</div>
            <nav class="space-y-2 flex-1">
                <button onclick="showPage('page-fix')" class="w-full text-left p-3 rounded-xl font-bold" id="nav-fix">Service Log</button>
                <button onclick="showPage('page-parts')" class="w-full text-left p-3 rounded-xl font-bold" id="nav-parts">Inventory</button>
                <button onclick="showPage('page-vehicles')" class="w-full text-left p-3 rounded-xl font-bold" id="nav-vehicles">Fleet</button>
                <button onclick="showPage('page-report')" class="w-full text-left p-3 rounded-xl font-bold" id="nav-report">Reports</button>
            </nav>
            <button onclick="logout()" class="p-3 text-red-400 font-bold text-left">Logout</button>
        </aside>

        <!-- Main Content Area -->
        <main class="md:ml-64 p-4 md:p-10">
            <!-- Workshop Log Page -->
            <div id="page-fix" class="page-content">
                <h2 class="text-2xl font-black uppercase mb-6">Workshop Entry</h2>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-8 space-y-4">
                        <div class="bg-white p-4 rounded-3xl border">
                            <input id="fixVSearch" onkeyup="filterFix()" placeholder="Search Plate..." class="w-full mb-3 p-3 bg-slate-50 rounded-xl text-sm font-bold outline-none">
                            <div id="fixVList" class="space-y-2 max-h-48 overflow-y-auto custom-scroll pr-2"></div>
                        </div>
                        <div class="bg-white p-4 rounded-3xl border">
                            <input id="fixPSearch" onkeyup="filterFix()" placeholder="Search Part..." class="w-full mb-3 p-3 bg-slate-50 rounded-xl text-sm font-bold outline-none">
                            <div id="fixPList" class="space-y-2 max-h-48 overflow-y-auto custom-scroll pr-2"></div>
                        </div>
                    </div>
                    <div class="md:col-span-4">
                        <div class="bg-white p-6 rounded-[2.5rem] border shadow-lg sticky top-6">
                            <div class="space-y-3 mb-6">
                                <div class="p-3 bg-emerald-50 rounded-xl"><p class="text-[9px] uppercase font-bold text-emerald-600">Unit</p><p id="sumV" class="font-black text-sm">---</p></div>
                                <div class="p-3 bg-sky-50 rounded-xl"><p class="text-[9px] uppercase font-bold text-sky-600">Part</p><p id="sumP" class="font-black text-sm">---</p></div>
                                <div class="flex items-center justify-between px-2">
                                    <span class="font-black text-xs">QTY</span>
                                    <div class="flex items-center bg-slate-900 text-white rounded-lg p-1">
                                        <button onclick="adjustQty(-1)" class="w-8 h-8 font-bold">-</button>
                                        <input id="fixQty" type="number" value="1" readonly class="bg-transparent w-8 text-center font-black">
                                        <button onclick="adjustQty(1)" class="w-8 h-8 font-bold">+</button>
                                    </div>
                                </div>
                            </div>
                            <button onclick="applyFix()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black uppercase shadow-md active:scale-95 transition-all">Submit Log</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Additional pages (Inventory, Fleet, Reports) go here with similar responsive design -->
            <div id="page-parts" class="page-content">
                <h2 class="text-2xl font-black uppercase mb-6">Inventory Control</h2>
                <!-- Simplified Table for Mobile -->
                <div class="overflow-hidden bg-white rounded-2xl border shadow-sm">
                    <table class="w-full text-left text-sm" id="inventoryTable">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-500">
                            <tr><th class="p-4">Item</th><th class="p-4">Stock</th><th class="p-4 text-right">Edit</th></tr>
                        </thead>
                        <tbody id="partsList"></tbody>
                    </table>
                </div>
            </div>
            
            <!-- (Other pages simplified for mobile clarity) -->
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav">
            <button onclick="showPage('page-fix')" class="text-slate-400 flex flex-col items-center gap-1">
                <div class="w-5 h-5 bg-current rounded-sm"></div>
                <span class="text-[9px] font-black uppercase">Log</span>
            </button>
            <button onclick="showPage('page-parts')" class="text-slate-400 flex flex-col items-center gap-1">
                <div class="w-5 h-5 bg-current rounded-sm"></div>
                <span class="text-[9px] font-black uppercase">Stock</span>
            </button>
            <button onclick="showPage('page-vehicles')" class="text-slate-400 flex flex-col items-center gap-1">
                <div class="w-5 h-5 bg-current rounded-sm"></div>
                <span class="text-[9px] font-black uppercase">Fleet</span>
            </button>
            <button onclick="showPage('page-report')" class="text-slate-400 flex flex-col items-center gap-1">
                <div class="w-5 h-5 bg-current rounded-sm"></div>
                <span class="text-[9px] font-black uppercase">Report</span>
            </button>
        </nav>
    </div>

    <script>
        // Use your existing firebase configuration here
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "cambolink21-inventory.firebaseapp.com",
            projectId: "cambolink21-inventory",
            storageBucket: "cambolink21-inventory.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
    <script src="app.js"></script>
</body>
</html>
